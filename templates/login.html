<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #4f46e5, #6366f1);">

<div class="container d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4" style="width: 350px;">
        <h4 class="text-center mb-4">Entrar</h4>

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-3" placeholder="Usuário">
            <input type="password" name="password" class="form-control mb-3" placeholder="Senha">

            <button class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>
</div>

</body>
</html>
