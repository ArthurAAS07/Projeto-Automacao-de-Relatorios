{% extends "base.html" %}

{% block content %}

<h3 class="mb-4">Meus Documentos</h3>

<div class="row">
    {% for doc in documentos %}
    <div class="col-md-4 mb-4">
        <div class="card p-3">
            <h5>{{ doc.nome }}</h5>
            <small class="text-muted">{{ doc.criado_em }}</small>

            <a href="{{ doc.arquivo.url }}" class="btn btn-primary mt-3">
                Baixar
            </a>
        </div>
        </div>
    {% empty %}
        <p>Nenhum documento ainda.</p>
    {% endfor %}
</div>

{% endblock %}
